        <h2 style="color: #2c3e50; font-size: 2.5em; margin-bottom: 20px;">港都建築之美：現代地標巡禮</h2>
        <p style="font-size: 1.2em; color: #555; margin-bottom: 30px;">
            歡迎來到高雄建築地標導覽網站。高雄，這座從重工業港灣轉型為文化藝術重鎮的城市，在近十年內誕生了許多國際級的建築作品。這些地標不僅改寫了高雄的天際線，更透過先進的結構工法與空間設計，重新定義了城市與市民的互動關係。
        </p>
        
        <div style="background-color: #f8f9fa; padding: 30px; border-radius: 10px; border: 1px solid #dee2e6; margin-bottom: 40px;">
            <h3 style="color: #2c3e50;">網站設計理念</h3>
            <p>本網站作為建築系學生之個人作業，旨在透過數位媒介梳理高雄最具代表性的三座建築：<strong>衛武營國家藝術文化中心、高雄流行音樂中心、高雄市立圖書館總館</strong>。我們將從「設計語彙」、「構造技術」與「城市紋理」三個維度，探討這些地標如何成為推動港都文化轉型的核心動能。</p>
